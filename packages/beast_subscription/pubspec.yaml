version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  purchases_flutter: ^9.9.7
  purchases_ui_flutter: ^9.11.0
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.0+1
  freezed: ^3.0.0
